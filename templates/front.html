<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Image Upload Portal</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">

  <!-- Header -->
  <div class="text-center mb-4">
    <h1 class="display-5 fw-bold">Upload Your File</h1>
    <p class="text-muted">PNG, JPG, PDF — metadata will be generated automatically</p>
  </div>

  <!-- Upload form -->
  <div class="card shadow-sm mb-5">
    <div class="card-body">
      <form action="/upload" method="post" enctype="multipart/form-data" class="row g-3">
        <div class="col-md-8">
          <input class="form-control" type="file" name="file" required>
        </div>
        <div class="col-md-4 d-grid">
          <button type="submit" class="btn btn-primary">Upload</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Recent uploads -->
  <h2 class="mb-3">Recent Uploads</h2>
  {% if recent %}
    <ul class="list-group">
      {% for r in recent %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
          <a href="{{ url_for('result', filename=r.filename) }}" class="fw-semibold text-decoration-none">
            {{ r.filename }}
          </a>
          <span class="badge bg-info text-dark">{{ r.status }}</span>
          <small class="text-muted">{{ r.created_at }}</small>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <div class="alert alert-secondary">No records yet.</div>
  {% endif %}

</div>
