<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Result: {{ rec.filename }}</title>
</head>
<body>
  <h1>{{ rec.filename }}</h1>
  <p>Status: {{ rec.status }}</p>
  <p>Created: {{ rec.created_at }}</p>

  <!-- Show image preview if it's an image file -->
{% if rec.filename.lower().endswith(('.png', '.jpg', '.jpeg', '.gif', '.webp')) %}
  <img src="{{ url_for('uploaded_file', filename=rec.filename) }}?v={{ rec.updated_at.timestamp() if rec.updated_at else 0 }}"
     alt="{{ rec.filename }}"
     style="max-width: 600px; border: 1px solid #ccc; margin: 10px 0;">

{% endif %}

  <h3>Stored document</h3>
  <pre>{{ rec | tojson(indent=2) }}</pre>

  <p><a href="/">← Back</a></p>
</body>
</html>
