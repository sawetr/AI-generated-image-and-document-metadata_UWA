<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Result - {{ rec.filename }}</title>
</head>
<body style="font-family: sans-serif; padding: 2rem;">

    <h1>Upload Result</h1>

    <h2>{{ rec.filename }}</h2>

    {% set img_src = url_for('uploaded_file', filename=rec.filename) %}
    {% if rec.get('gridfs_id') %}
      {% set img_src = url_for('file_stream', file_id=rec.gridfs_id) %}
    {% endif %}

    <img src="{{ img_src }}?v={{ rec.updated_at.timestamp() if rec.updated_at else 0 }}"
         alt="{{ rec.filename }}" style="max-width: 700px; border: 1px solid #ccc;">

    <p><strong>Rotation applied:</strong> {{ rec.rotation or "N/A" }}</p>

    <hr>
    <p><a href="{{ url_for('index') }}">← Back to Home</a></p>
</body>
</html>
